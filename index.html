<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💎 Gem Pricing Intelligence</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>💎 Gem Pricing Intelligence</h1>

    <div class="form-group">
      <label for="gem-select">Edelstein</label>
      <select id="gem-select" class="form-control"></select>
    </div>

    <div class="form-group">
      <label for="quality-select">Clarity</label>
      <select id="quality-select" class="form-control"></select>
    </div>

    <div class="form-group">
      <label for="carat">Karat (ct)</label>
      <input type="number" id="carat" class="form-control"
             min="0.1" max="9999" step="0.01" placeholder="z.B. 2.50">
    </div>

    <div class="form-group">
      <label for="mode-select">Preismodus</label>
      <select id="mode-select" class="form-control">
        <option value="retail">Retail (Verkaufspreis)</option>
        <option value="wholesale">Großhandel (Einkaufspreis)</option>
      </select>
    </div>

    <button class="btn-calculate" id="calc-btn">Preis berechnen</button>

    <div id="result" class="result-box"></div>

    <div class="history-section">
      <div class="history-header">
        <h3>Letzte Berechnungen</h3>
        <button id="clear-history" class="btn-clear">Löschen</button>
      </div>
      <div id="history"></div>
    </div>
  </div>

  <!-- ES Modules: type="module" ist entscheidend -->
  <script type="module" src="js/ui.js"></script>
</body>
</html>
