<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gem Intelligence</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <header class="app-header">
      <h1>&#128142; Gem Intelligence</h1>
      <p class="subtitle">Professional Gemstone Pricing</p>
    </header>

    <p id="stones-counter"></p>

    <div class="card">

      <div class="mode-toggle">
        <button class="mode-btn active" id="btn-retail"    onclick="setMode('retail')">Retail</button>
        <button class="mode-btn"        id="btn-wholesale" onclick="setMode('wholesale')">Grosshandel</button>
      </div>

      <div class="form-group">
        <label for="gem-select">Edelstein</label>
        <select id="gem-select" class="form-control"></select>
      </div>

      <!-- Modifier-Buttons erscheinen hier direkt nach Gem-Auswahl -->
      <div id="modifier-buttons"></div>

      <div class="form-group">
        <label for="quality-select">Clarity</label>
        <select id="quality-select" class="form-control"></select>
      </div>

      <div class="form-group">
        <label for="carat-input">Karat (ct)</label>
        <input type="number" id="carat-input" class="form-control"
               min="0.1" max="9999" step="0.01" placeholder="z.B. 2.50">
      </div>

      <button class="btn-calculate" id="calc-btn" onclick="calculateAndDisplay()">Preis berechnen</button>

      <div id="result" class="result-box"></div>

    </div>

    <!-- ══════════════════════════════════════════════════════════
        VISION CARD v4 — Multi-Bild Upload mit Thumbnail-Vorschau
        ══════════════════════════════════════════════════════════ -->
    <div class="card vision-card">

      <div class="vision-card-title">
        <span>🔍 KI-Steinerkennung</span>
        <span id="vision-status"></span>
      </div>

      <!-- Bild 1 (Pflicht) -->
      <div class="vision-upload-area">
        <label class="vision-upload-label" for="vision-upload">
          <span>📷</span>
          Bild 1 hochladen (Pflicht · JPG, PNG, WebP · max. 10MB)
        </label>
        <input type="file" id="vision-upload" accept="image/jpeg,image/png,image/webp">
      </div>

      <!-- Bild 2 (optional) -->
      <div class="vision-upload-area vision-upload-optional">
        <label class="vision-upload-label" for="vision-upload-2">
          <span>📷</span>
          Bild 2 — anderer Winkel (optional)
        </label>
        <input type="file" id="vision-upload-2" accept="image/jpeg,image/png,image/webp">
      </div>

      <!-- Bild 3 (optional) -->
      <div class="vision-upload-area vision-upload-optional">
        <label class="vision-upload-label" for="vision-upload-3">
          <span>📷</span>
          Bild 3 — weiterer Winkel (optional)
        </label>
        <input type="file" id="vision-upload-3" accept="image/jpeg,image/png,image/webp">
      </div>

      <!-- Thumbnail-Vorschau Zeile -->
      <div class="vision-previews-row" id="vision-previews-row"></div>

      <!-- Hidden img tags (weiterhin für JS benötigt) -->
      <img id="vision-preview"   hidden alt="">
      <img id="vision-preview-2" hidden alt="">
      <img id="vision-preview-3" hidden alt="">

      <!-- Analyse-Button -->
      <button class="btn-vision-analyze" id="vision-analyze-btn">
        Stein analysieren
      </button>

      <!-- Ergebnis -->
      <div id="vision-result"></div>

    </div>




    <div class="card history-section">
      <div class="history-header">
        <h3>Letzte Berechnungen</h3>
        <button id="clear-history" class="btn-clear">Loeschen</button>
      </div>
      <div id="history"></div>
    </div>

  </div>

  <script type="module" src="./js/ui.js"></script>
  <script type="module" src="./js/vision.js"></script>
</body>
</html>
